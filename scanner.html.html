<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select User</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
  color: #0063A0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  margin: 0;
  padding: 2rem;
}

header {
  background-color: #0089D1;
  width: 100%;
  padding: 0.5rem;
  text-align: center;
}

header img {
  max-width: 250px;
}

h1 {
  margin: 2rem 0 2rem;
}

.user-buttons {
  display: grid;
  grid-template-columns: repeat(4, 250px);
  gap: 2rem;
  margin-bottom: 2rem;
  margin-top: 3rem;
}

.user-button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  background-color: transparent;
  border: none;
  cursor: pointer;
}

.user-button img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  max-width: 250px;
  max-height: 250px;
}
</style>
</head>

<body>

<header>
<img src="Mistek-Logos-Authorised-03.png" alt="Mistek Logo">
</header>

<h1>Select Who is Scanning</h1>

<div class="user-buttons">
<button class="user-button" onclick="selectUser('Nick')"><img src="Nick.png" alt="Nick"></button>
<button class="user-button" onclick="selectUser('Mike')"><img src="Mike.png" alt="Mike"></button>
<button class="user-button" onclick="selectUser('Paul')"><img src="Paul.png" alt="Paul"></button>
<button class="user-button" onclick="selectUser('Ken')"><img src="Ken.png" alt="Ken"></button>
<button class="user-button" onclick="selectUser('Richard')"><img src="Richard.png" alt="Richard"></button>
<button class="user-button" onclick="selectUser('Kieran')"><img src="Kieran.png" alt="Kieran"></button>
<button class="user-button" onclick="selectUser('Spav')"><img src="Spav.png" alt="Spav"></button>
<button class="user-button" onclick="selectUser('Office')"><img src="Office.png" alt="Office"></button>
</div>

<script>
function selectUser(name) {
  localStorage.setItem('selectedUser', name);
  window.location.href = "scanner.html";
}
</script>

<!-- Faulty Equipment Button -->
<div id="faultyButton" style="
position: fixed;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
background-color: #FF0000;
color: white;
padding: 14px 28px;
border-radius: 5px;
cursor: pointer;
font-size: 1.3rem;">
Faulty Equipment?
</div>

<!-- Running Low Button -->
<div id="popupButton" style="
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background-color: #FF0000;
color: white;
padding: 14px 28px;
border-radius: 5px;
cursor: pointer;
font-size: 1.3rem;">
Running low on something?
</div>

<script>
function createPopup(url) {

  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.backgroundColor = "rgba(0,0,0,0.5)";
  overlay.style.zIndex = "1000";
  overlay.style.display = "flex";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";

  const container = document.createElement("div");
  container.style.position = "relative";
  container.style.width = "95%";
  container.style.maxWidth = "1200px";
  container.style.height = "80%";
  container.style.borderRadius = "12px";
  container.style.overflow = "hidden";
  container.style.boxShadow = "0 0 20px rgba(0,0,0,0.3)";
  container.style.backgroundColor = "#fff";

  const iframe = document.createElement("iframe");
  iframe.src = url;
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.style.border = "none";

  const closeBtn = document.createElement("button");
  closeBtn.textContent = "×";
  closeBtn.style.position = "absolute";
  closeBtn.style.top = "10px";
  closeBtn.style.right = "15px";
  closeBtn.style.background = "red";
  closeBtn.style.color = "white";
  closeBtn.style.border = "none";
  closeBtn.style.borderRadius = "50%";
  closeBtn.style.width = "40px";
  closeBtn.style.height = "40px";
  closeBtn.style.fontSize = "1.5rem";
  closeBtn.style.cursor = "pointer";

  closeBtn.onclick = () => document.body.removeChild(overlay);

  container.appendChild(closeBtn);
  container.appendChild(iframe);
  overlay.appendChild(container);
  document.body.appendChild(overlay);
}

document.getElementById("popupButton").onclick = function() {
  createPopup("https://taylor386.typeform.com/to/UziCjG93");
};

document.getElementById("faultyButton").onclick = function() {
  createPopup("https://taylor386.typeform.com/to/hXf0Wa");
};
</script>

</body>
</html>
